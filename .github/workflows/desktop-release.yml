name: Desktop Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to publish, for example v0.2.1"
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish-macos:
    name: Publish macOS ${{ matrix.rust_target }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        rust_target:
          - aarch64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Restore Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Ensure bundled Apple Silicon runtime is staged
        shell: bash
        run: |
          test -x bundle-resources/macos-arm64/bin/karospacer-rscript || {
            echo "Bundled Apple Silicon R runtime is not staged in this checkout." >&2
            echo "CI release publishing is intentionally blocked until runtime staging is added to the workflow." >&2
            exit 1
          }

      - name: Import Apple signing certificate
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id-application.p12"

          printf '%s' "$APPLE_CERTIFICATE" | base64 -D > "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          APPLE_SIGNING_IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | awk -F'"' '/Developer ID Application/ { print $2; exit }')
          if [ -z "$APPLE_SIGNING_IDENTITY" ]; then
            echo "Developer ID Application signing identity was not found in the imported certificate." >&2
            exit 1
          fi

          echo "APPLE_SIGNING_IDENTITY=$APPLE_SIGNING_IDENTITY" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          rm -f "$CERTIFICATE_PATH"

      - name: Build and publish signed DMG
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.event.inputs.tag_name }}
          releaseName: KaroSpaceRBuilder ${{ github.event.inputs.tag_name }}
          releaseBody: |
            Signed macOS DMG release for KaroSpaceRBuilder.

            The app bundles KaroSpaceR, but it still requires a local R installation
            with the needed R packages for the datasets you want to export.
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.rust_target }}

      - name: Remove temporary keychain
        if: always()
        shell: bash
        run: |
          if [ -n "${KEYCHAIN_PATH:-}" ]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi
